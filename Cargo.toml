[package]
name = "zoi-rs"
version = "1.18.3"
edition = "2024"
rust-version = "1.92.0"
description = "Advanced Package Manager & Environment Orchestrator"
license = "Apache-2.0"
repository = "https://gitlab.com/zillowe/zillwen/zusty/zoi"
homepage = "https://zillowe.qzz.io/zds/zoi"
documentation = "https://docs.rs/zoi-rs/latest/zoi"
keywords = ["cli", "package-manager", "dev-tools", "universal", "environment"]
categories = ["command-line-utilities", "development-tools"]
readme = "README.md"
build = "build.rs"
default-run = "zoi"
include = [
  "Cargo.toml",
  "Cargo.lock",
  "build.rs",
  "README.md",
  "LICENSE",
  "CHANGELOG.md",
  "rust-toolchain.toml",
  "src/**",
  "tests/**",
]

[lib]
name = "zoi"
path = "src/lib.rs"

[[bin]]
name = "zoi"
path = "src/main.rs"

[[bin]]
name = "zoi-mini"
path = "src/bin/zoi-mini.rs"

[profile.release]
strip = true
lto = "fat"
codegen-units = 1
# panic = "abort"
opt-level = 3

[profile.release.package."*"]
opt-level = "z"

[lints.clippy]
too_many_arguments = "allow"
type_complexity = "allow"

[package.metadata.cargo-machete]
ignored = ["openssl", "phf"]

[package.metadata.deb]
name = "zoi"
maintainer = "Zillowe Team <contact@zillowe.qzz.io>"
copyright = "2024 Zillowe"
license-file = ["LICENSE", "4"]
depends = "$auto, git"
section = "utils"
priority = "optional"
assets = [
  ["target/release/zoi", "/usr/bin/zoi", "755"],
  ["README.md", "/usr/share/doc/zoi/README.md", "644"],
  ["LICENSE", "/usr/share/doc/zoi/copyright", "644"],
]

[package.metadata.rpm]
package = "zoi"

[package.metadata.rpm.cargo]
buildflags = ["--release", "--bin", "zoi"]

[package.metadata.rpm.targets]
zoi = { path = "/usr/bin/zoi" }

[package.metadata.rpm.files]
"README.md" = { path = "/usr/share/doc/zoi/README.md", mode = "644" }
"LICENSE" = { path = "/usr/share/licenses/zoi/LICENSE", mode = "644" }

[dependencies]
anyhow = "1.0.102"
chrono = { version = "0.4.45", features = ["serde"] }
clap = { version = "4.6.1", features = ["derive", "color"] }
clap_complete = "4.6.5"
clap_mangen = "0.3.0"
colored = "3.1.1"
comfy-table = "7.2.2"
crossterm = "0.29.0"
dialoguer = "0.12.0"
dirs = "6.0.0"
flate2 = "1.1.9"
fs2 = "0.4.3"
git2 = { version = "0.21.0", features = ["https", "vendored-openssl"] }
hex = "0.4.3"
home = "0.5.12"
indicatif = "0.18.4"
junction = "2.0.0"
md5 = "0.8.0"
mlua = { version = "0.11.6", features = ["luau", "serde"] }
nix = { version = "0.31.3", features = ["user", "fs"] }
openssl = { version = "0.10.80", features = ["vendored"] }
pulldown-cmark = { version = "0.13.3", default-features = false }
ratatui = { version = "0.30.1", features = ["crossterm"] }
rayon = "1.12.0"
regex = "1.12.3"
reqwest = { version = "0.13.4", default-features = false, features = [
  "blocking",
  "json",
  "rustls",
] }
self_update = "0.44.0"
semver = "1.0.28"
sequoia-openpgp = { version = "2.3.0", default-features = false, features = [
  "crypto-openssl",
] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
serde_yaml = "0.9.34"
sha2 = "0.11.0"
spdx = "0.13.4"
syntect = "5.3.0"
tar = "0.4.46"
tempfile = "3.27.0"
toml = "1.0.3"
urlencoding = "2.1.3"
uuid = { version = "1.23.2", features = ["v7"] }
walkdir = "2.5.0"
winapi = { version = "0.3.9", features = ["securitybaseapi", "winnt"] }
xz2 = "0.1.7"
zip = { version = "8.6.0", default-features = false, features = ["deflate"] }
zstd = "0.13.3"
ar = "0.9.0"
sevenz-rust = "0.6.1"
phf = "0.13.1"
rusqlite = { version = "0.40.1", features = ["bundled"] }
glob = "0.3.3"
pubgrub = "0.4.0"
thiserror = "2.0.18"
rustc-hash = "2.1.2"
json5 = "1.3.1"
purl = "0.1.6"

[build-dependencies]
dotenvy = "0.15.7"
phf = { version = "0.13.1", features = ["macros"] }
phf_codegen = "0.13.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[target.'cfg(windows)'.dependencies]
winreg = "0.56.0"
