include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml

variables:
  DS_ENFORCE_NEW_ANALYZER: "true"
  CARGO_INCREMENTAL: "0"

stages:
  - test
  - build
  - package
  - release
  - release-package

.rust_setup:
  image: rust:latest
  before_script:
    - apt-get update -yq && apt-get install -y build-essential gcc

format:
  stage: test
  extends:
    - .rust_setup
  before_script:
    - rustup component add rustfmt
  script:
    - cargo fmt -- --check
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes:
        - "Cargo.toml"
        - "Cargo.lock"
        - "src/**/*"
        - "tests/**/*"
        - "build.rs"
        - ".cargo/**/*"
        - "test_assets/**/*"
    - if: $CI_COMMIT_BRANCH
      changes:
        - "Cargo.toml"
        - "Cargo.lock"
        - "src/**/*"
        - "tests/**/*"
        - "build.rs"
        - ".cargo/**/*"
        - "test_assets/**/*"

lint:
  stage: test
  extends:
    - .rust_setup
  variables:
    RUSTFLAGS: "-Dwarnings"
  before_script:
    - rustup component add clippy
  script:
    - cargo clippy --all-targets --all-features
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes:
        - "Cargo.toml"
        - "Cargo.lock"
        - "src/**/*"
        - "tests/**/*"
        - "build.rs"
        - ".cargo/**/*"
        - "test_assets/**/*"
    - if: $CI_COMMIT_BRANCH
      changes:
        - "Cargo.toml"
        - "Cargo.lock"
        - "src/**/*"
        - "tests/**/*"
        - "build.rs"
        - ".cargo/**/*"
        - "test_assets/**/*"

test:
  stage: test
  extends:
    - .rust_setup
  variables:
    RUSTFLAGS: "-Dwarnings"
  script:
    - cargo test --all-features -- --test-threads=1
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes:
        - "Cargo.toml"
        - "Cargo.lock"
        - "src/**/*"
        - "tests/**/*"
        - "build.rs"
        - ".cargo/**/*"
        - "test_assets/**/*"
    - if: $CI_COMMIT_BRANCH
      changes:
        - "Cargo.toml"
        - "Cargo.lock"
        - "src/**/*"
        - "tests/**/*"
        - "build.rs"
        - ".cargo/**/*"
        - "test_assets/**/*"

build:linux:
  stage: build
  image: rust:latest
  tags:
    - saas-linux-large-amd64
  before_script:
    - dpkg --add-architecture arm64
    - dpkg --add-architecture armhf
    - apt-get update -y && apt-get install -y build-essential gcc g++
      gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libssl-dev pkg-config
      libssl-dev:arm64 openssl libssl-dev:armhf gcc-mingw-w64-x86-64
      g++-mingw-w64-x86-64 liblzma-dev:arm64
  script:
    - echo "Building Zoi and Zoi Mini for Linux (amd64, arm64) and Windows
      (amd64) targets..."
    - chmod +x ./scripts/build-linux.sh
    - ./scripts/build-linux.sh
  artifacts:
    paths:
      - ./scripts/release/
    expire_in: 3 days
  rules:
    - if: $CI_COMMIT_TAG

build:macos:
  stage: build
  tags:
    - saas-macos-medium-m1
  image: macos-15-xcode-16
  before_script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source ~/.cargo/env
  script:
    - echo "Building Zoi and Zoi Mini for macOS targets (amd64, arm64)..."
    - chmod +x ./scripts/build-macos.sh
    - ./scripts/build-macos.sh
  artifacts:
    paths:
      - ./scripts/release/
    expire_in: 3 days
  rules:
    - if: $CI_COMMIT_TAG

package:archive:
  stage: package
  image: ubuntu:latest
  before_script:
    - apt-get update -y && apt-get install -y p7zip-full tar zstd curl git jq
      unzip gnupg coreutils
  script:
    - |
      set -euo pipefail
      echo "Aggregating build artifacts..."
      echo "Contents of the release directory:"
      ls -lR ./scripts/release/
      echo "Importing GPG key..."
      echo "$GPG_PRIVATE_KEY_B32" | base32 -d | gpg --batch --import
      echo "Running archive script..."
      chmod +x ./scripts/archive.sh
      ./scripts/archive.sh
      echo "Archiving complete."
  needs:
    - build:linux
    - build:macos
  artifacts:
    paths:
      - ./scripts/archived/
    expire_in: 3 days
  rules:
    - if: $CI_COMMIT_TAG

generate_notes:
  stage: package
  image: ubuntu:latest
  variables:
    GIT_DEPTH: 0
    GCT_API_KEY: $GCT_API_KEY_GOOGLE
  before_script:
    - apt-get update -y && apt-get install -y curl git tar zstd grep sed gnupg coreutils
    - curl -fsSL https://zillowe.pages.dev/scripts/zoi/install.sh | bash
    - export PATH="$HOME/.zoi/pkgs/bin:$PATH"
    - zoi sync
    - zoi install @zillowe/gct
  script:
    - PREVIOUS_TAG=$(git describe --tags --abbrev=0 $CI_COMMIT_TAG^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
    - gct ai log -c "$PREVIOUS_TAG" "$CI_COMMIT_TAG" > notes.md
  artifacts:
    paths:
      - notes.md
    expire_in: 3 days
  rules:
    - if: $CI_COMMIT_TAG

create_release:
  stage: release
  image: gitlab/glab
  variables:
    GIT_DEPTH: 0
  script:
    - glab auth login --token $GITLAB_TOKEN_RELEASE
    - RELEASE_NAME="${CI_COMMIT_TAG_MESSAGE:-$CI_COMMIT_TAG}"
    - glab release create "$CI_COMMIT_TAG" ./scripts/archived/* --name
      "$RELEASE_NAME" --notes-file notes.md
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - package:archive
    - generate_notes

build-docker-image:
  stage: release
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "Building Zoi Docker image..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --build-arg POSTHOG_API_KEY="$POSTHOG_API_KEY" --build-arg
      POSTHOG_API_HOST="$POSTHOG_API_HOST" --build-arg
      ZOI_DEFAULT_REGISTRY="$ZOI_DEFAULT_REGISTRY" -t
      $CI_REGISTRY_IMAGE/zoi:$CI_COMMIT_TAG -t $CI_REGISTRY_IMAGE/zoi:latest -f
      Dockerfile .
    - docker push $CI_REGISTRY_IMAGE/zoi:$CI_COMMIT_TAG
    - docker push $CI_REGISTRY_IMAGE/zoi:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - create_release

release:crates-io:
  stage: release
  image: rust:latest
  script:
    - cargo publish --token $CRATESIO_REGISTRY_TOKEN
  needs:
    - create_release
  rules:
    - if: "$CI_COMMIT_TAG =~ /^Prod-Release-/"

release:packages:
  stage: release-package
  image: archlinux:latest
  before_script:
    - pacman -Sy --needed --noconfirm base-devel sed git openssh sudo
  script:
    - chmod +x ./scripts/packages.sh
    - ./scripts/packages.sh
  needs:
    - create_release
    - package:archive
  rules:
    - if: "$CI_COMMIT_TAG =~ /^Prod-Release-/"

docs:update:
  stage: test
  image: alpine:latest
  before_script:
    - apk add --no-cache git
    - git config --global user.email "contact@zillowe.qzz.io"
    - git config --global user.name "Zillowe CI/CD"
  script:
    - echo "Cloning website repository..."
    - git clone
      "https://oauth2:${GITLAB_TOKEN_DOCS}@gitlab.com/Zillowe/Website.git"
    - cd Website
    - echo "Removing old documentation..."
    - rm -rf "content/docs/(main)/zds/zoi"
    - mkdir -p "content/docs/(main)/zds/zoi"
    - echo "Copying new documentation..."
    - cp -r "$CI_PROJECT_DIR/docs/". "content/docs/(main)/zds/zoi"
    - |
      git add .
      if git diff --staged --quiet; then
        echo "No changes to the documentation."
      else
        echo "Committing and pushing changes..."
        git commit -m "Docs: Update Zoi documentation from $CI_COMMIT_SHA"
        git push
      fi
  rules:
    - if: "$CI_COMMIT_MESSAGE =~ /^Docs: Docs/"
