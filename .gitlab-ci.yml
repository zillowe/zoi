include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml

variables:
  DS_ENFORCE_NEW_ANALYZER: "true"
  CARGO_INCREMENTAL: "0"

stages:
  - test
  - build
  - package
  - release
  - release-package

.base_apt: &base_apt
  - apt-get update -yq
  - apt-get install -y build-essential gcc libssl-dev pkg-config liblzma-dev git

.rust_setup:
  image: rust:latest
  before_script:
    - *base_apt
    - apt-get install -y bubblewrap

format:
  stage: test
  extends:
    - .rust_setup
  before_script:
    - *base_apt
    - rustup component add rustfmt
  script:
    - cargo fmt -- --check
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes: &code_changes
        - "Cargo.toml"
        - "Cargo.lock"
        - "crates/**/*"
        - ".cargo/**/*"
        - "test_assets/**/*"
    - if: $CI_COMMIT_BRANCH
      changes: *code_changes

lint:
  stage: test
  extends:
    - .rust_setup
  variables:
    RUSTFLAGS: "-Dwarnings"
  before_script:
    - *base_apt
    - rustup component add clippy
  script:
    - cargo clippy --all-targets --all-features
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes: *code_changes
    - if: $CI_COMMIT_BRANCH
      changes: *code_changes

test:
  stage: test
  extends:
    - .rust_setup
  variables:
    RUSTFLAGS: "-Dwarnings"
  script:
    - cargo test --all-features -- --test-threads=1
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes: *code_changes
    - if: $CI_COMMIT_BRANCH
      changes: *code_changes

.build_linux_base:
  stage: build
  image: rust:latest
  tags:
    - saas-linux-large-amd64
  before_script:
    - *base_apt
  rules:
    - if: $CI_COMMIT_TAG

build:linux-amd64:
  extends: .build_linux_base
  script:
    - chmod +x ./scripts/linux-amd64.sh
    - ./scripts/linux-amd64.sh
  artifacts:
    paths:
      - scripts/release/zoi-linux-amd64
      - scripts/release/zoi-mini-linux-amd64
      - target/x86_64-unknown-linux-gnu/release/zoi
      - target/x86_64-unknown-linux-gnu/release/zoi-mini
    expire_in: 1 day

build:linux-arm64:
  extends: .build_linux_base
  before_script:
    - dpkg --add-architecture arm64
    - apt-get update -yq
    - apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libssl-dev:arm64 pkg-config liblzma-dev:arm64 git
  script:
    - chmod +x ./scripts/linux-arm64.sh
    - ./scripts/linux-arm64.sh
  artifacts:
    paths:
      - scripts/release/zoi-linux-arm64
      - scripts/release/zoi-mini-linux-arm64
      - target/aarch64-unknown-linux-gnu/release/zoi
      - target/aarch64-unknown-linux-gnu/release/zoi-mini
    expire_in: 1 day

build:windows-amd64:
  extends: .build_linux_base
  before_script:
    - apt-get update -yq
    - apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 git
  script:
    - chmod +x ./scripts/windows-amd64.sh
    - ./scripts/windows-amd64.sh
  artifacts:
    paths:
      - scripts/release/zoi-windows-amd64.exe
      - scripts/release/zoi-mini-windows-amd64.exe
    expire_in: 1 day

.build_macos_base:
  stage: build
  tags:
    - saas-macos-medium-m1
  image: macos-15-xcode-16
  before_script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source ~/.cargo/env
  rules:
    - if: $CI_COMMIT_TAG

build:macos-amd64:
  extends: .build_macos_base
  script:
    - chmod +x ./scripts/macos-amd64.sh
    - ./scripts/macos-amd64.sh
  artifacts:
    paths:
      - scripts/release/zoi-macos-amd64
      - scripts/release/zoi-mini-macos-amd64
    expire_in: 1 day

build:macos-arm64:
  extends: .build_macos_base
  script:
    - chmod +x ./scripts/macos-arm64.sh
    - ./scripts/macos-arm64.sh
  artifacts:
    paths:
      - scripts/release/zoi-macos-arm64
      - scripts/release/zoi-mini-macos-arm64
    expire_in: 1 day

package:deb:
  stage: package
  image: rust:latest
  needs:
    - build:linux-amd64
    - build:linux-arm64
  before_script:
    - cargo install cargo-deb
  script:
    - chmod +x ./scripts/deb-package.sh
    - ./scripts/deb-package.sh
  artifacts:
    paths:
      - scripts/release/packages/*.deb
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_TAG

package:rpm:
  stage: package
  image: rust:latest
  needs:
    - build:linux-amd64
    - build:linux-arm64
  before_script:
    - cargo install cargo-generate-rpm
  script:
    - chmod +x ./scripts/rpm-package.sh
    - ./scripts/rpm-package.sh
  artifacts:
    paths:
      - scripts/release/packages/*.rpm
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_TAG

package:archive:
  stage: package
  image: ubuntu:latest
  needs:
    - build:linux-amd64
    - build:linux-arm64
    - build:windows-amd64
    - build:macos-amd64
    - build:macos-arm64
    - package:deb
    - package:rpm
  before_script:
    - apt-get update -y && apt-get install -y p7zip-full tar zstd curl git jq
      unzip gnupg coreutils
  script:
    - |
      set -euo pipefail
      echo "Aggregating build artifacts..."
      ls -lR ./scripts/release/
      echo "Importing GPG key..."
      echo "$GPG_PRIVATE_KEY_B32" | base32 -d | gpg --batch --import
      echo "Running archive script..."
      chmod +x ./scripts/archive.sh
      ./scripts/archive.sh
  artifacts:
    paths:
      - ./scripts/archived/
    expire_in: 3 days
  rules:
    - if: $CI_COMMIT_TAG

generate_notes:
  stage: package
  image: ubuntu:latest
  variables:
    GIT_DEPTH: 0
    GCT_API_KEY: $GCT_API_KEY_GOOGLE
  before_script:
    - apt-get update -y && apt-get install -y curl git tar zstd grep sed gnupg coreutils
    - curl -fsSL https://zillowe.pages.dev/scripts/zoi/install.sh | bash
    - export PATH="$HOME/.zoi/pkgs/bin:$PATH"
    - zoi sync
    - zoi install @zillowe/gct --yes
  script:
    - PREVIOUS_TAG=$(git describe --tags --abbrev=0 $CI_COMMIT_TAG^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
    - gct ai log -c "$PREVIOUS_TAG" "$CI_COMMIT_TAG" > notes.md
  artifacts:
    paths:
      - notes.md
    expire_in: 3 days
  rules:
    - if: $CI_COMMIT_TAG

create_release:
  stage: release
  image: gitlab/glab
  variables:
    GIT_DEPTH: 0
  script:
    - glab auth login --token $GITLAB_TOKEN_RELEASE
    - RELEASE_NAME="${CI_COMMIT_TAG_MESSAGE:-$CI_COMMIT_TAG}"
    - glab release create "$CI_COMMIT_TAG" ./scripts/archived/* --name
      "$RELEASE_NAME" --notes-file notes.md
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - package:archive
    - generate_notes

build-docker-image:
  stage: release
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "Building Zoi Docker image..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --build-arg POSTHOG_API_KEY="$POSTHOG_API_KEY" --build-arg
      POSTHOG_API_HOST="$POSTHOG_API_HOST" --build-arg
      ZOI_DEFAULT_REGISTRY="$ZOI_DEFAULT_REGISTRY" -t
      $CI_REGISTRY_IMAGE/zoi:$CI_COMMIT_TAG -t $CI_REGISTRY_IMAGE/zoi:latest -f
      Dockerfile .
    - docker push $CI_REGISTRY_IMAGE/zoi:$CI_COMMIT_TAG
    - docker push $CI_REGISTRY_IMAGE/zoi:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - create_release

release:crates-io:
  stage: release
  image: rust:latest
  script:
    - cargo publish --token $CRATESIO_REGISTRY_TOKEN
  needs:
    - create_release
  rules:
    - if: "$CI_COMMIT_TAG =~ /^Prod-Release-/"

release:packages:
  stage: release-package
  image: archlinux:latest
  before_script:
    - pacman -Sy --needed --noconfirm base-devel sed git openssh sudo
  script:
    - chmod +x ./scripts/packages.sh
    - ./scripts/packages.sh
  needs:
    - create_release
    - package:archive
  rules:
    - if: "$CI_COMMIT_TAG =~ /^Prod-Release-/"

docs:update:
  stage: test
  image: alpine:latest
  before_script:
    - apk add --no-cache git
    - git config --global user.email "contact@zillowe.qzz.io"
    - git config --global user.name "Zillowe CI/CD"
  script:
    - echo "Cloning website repository..."
    - git clone
      "https://oauth2:${GITLAB_TOKEN_DOCS}@gitlab.com/Zillowe/Website.git"
    - cd Website
    - echo "Removing old documentation..."
    - rm -rf "content/docs/(main)/zds/zoi"
    - mkdir -p "content/docs/(main)/zds/zoi"
    - echo "Copying new documentation..."
    - cp -r "$CI_PROJECT_DIR/docs/". "content/docs/(main)/zds/zoi"
    - |
      git add .
      if git diff --staged --quiet; then
        echo "No changes to the documentation."
      else
        echo "Committing and pushing changes..."
        git commit -m "Docs: Update Zoi documentation from $CI_COMMIT_SHA"
        git push
      fi
  rules:
    - if: "$CI_COMMIT_MESSAGE =~ /^Docs: Docs/"
